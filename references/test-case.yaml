- module: 登录模块
  title: 正常登录-正确的用户名和密码
  priority: 高
  precondition: 用户已注册且账号正常
  steps: |
    1. 打开登录页面
    2. 输入正确的用户名
    3. 输入正确的密码
    4. 点击登录按钮
  expected: 登录成功，页面跳转到首页，右上角显示用户名

- module: 登录模块
  title: 密码错误提示
  priority: 中
  precondition: 用户已注册
  steps: |
    1. 打开登录页面
    2. 输入正确的用户名
    3. 输入错误的密码
    4. 点击登录按钮
  expected: 登录失败，页面提示"用户名或密码错误"

- module: 注册模块
  title: 正常注册流程
  priority: 高
  precondition: 邮箱未被注册
  steps: |
    1. 打开注册页面
    2. 输入邮箱
    3. 输入用户名
    4. 输入密码
    5. 确认密码
    6. 点击注册按钮
  expected: 注册成功，发送验证邮件，页面提示"请查收验证邮件"
